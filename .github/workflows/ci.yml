name: ci

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: astral-sh/setup-uv@v5

      - name: Install test environment
        run: |
          uv venv
          uv pip install -e . --no-deps
          uv pip install pytest numpy

      - name: Byte-compile sources
        run: |
          uv run python -m py_compile $(find src tools tests -name '*.py' -print)

      - name: Run tests
        run: |
          uv run pytest -q
